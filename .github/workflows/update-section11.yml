name: Update Section 11 Protocol

on:
  schedule:
    # Check daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest SECTION_11.md from CrankAddict/section-11
        run: |
          echo "Fetching latest SECTION_11.md..."
          curl -sL "https://raw.githubusercontent.com/CrankAddict/section-11/main/SECTION_11.md" -o SECTION_11_new.md

          if [ ! -s SECTION_11_new.md ]; then
            echo "❌ Failed to fetch SECTION_11.md (empty or missing)"
            exit 1
          fi

          echo "✅ Fetched $(wc -c < SECTION_11_new.md) bytes"

      - name: Check for changes
        id: check
        run: |
          if [ -f SECTION_11.md ]; then
            if diff -q SECTION_11.md SECTION_11_new.md > /dev/null 2>&1; then
              echo "No changes detected"
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "Changes detected"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "First time — file doesn't exist yet"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update file
        if: steps.check.outputs.changed == 'true'
        run: |
          mv SECTION_11_new.md SECTION_11.md

          # Extract version if present
          VERSION=$(grep -oP 'Version[:\s]+\K[\d.]+' SECTION_11.md | head -1 || echo "unknown")
          echo "Protocol version: ${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add SECTION_11.md
          git commit -m "Update Section 11 protocol to v${VERSION:-latest}"
          git push
          echo "✅ SECTION_11.md updated and pushed"

      - name: Purge CDN cache
        if: steps.check.outputs.changed == 'true'
        run: |
          curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/SECTION_11.md" || true
          echo "✅ CDN cache purged"

      - name: Clean up
        if: always()
        run: rm -f SECTION_11_new.md
