name: Auto-Sync Intervals.icu Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-training-data
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Verify sync.py exists
        run: |
          if [ ! -f sync.py ]; then
            echo "❌ ERROR: sync.py not found in repository!"
            ls -la
            exit 1
          fi
          echo "✅ sync.py found ($(wc -c < sync.py) bytes)"
      
      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.ATHLETE_ID }}" ]; then
            echo "❌ ERROR: ATHLETE_ID secret not set!"
            exit 1
          fi
          if [ -z "${{ secrets.INTERVALS_KEY }}" ]; then
            echo "❌ ERROR: INTERVALS_KEY secret not set!"
            exit 1
          fi
          echo "✅ All secrets configured"
      
      - name: Run sync
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          echo "🚀 Running sync script..."
          python sync.py \
            --athlete-id "$ATHLETE_ID" \
            --intervals-key "$INTERVALS_KEY" \
            --github-token "$GITHUB_TOKEN" \
            --github-repo "$GITHUB_REPO" \
            --days 7 || {
              echo "❌ Sync script failed with exit code $?"
              exit 1
            }
      
      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Archive latest.json with timestamp
        if: success()
        run: |
          # sync.py publishes latest.json via GitHub API, so pull the fresh version
          git pull --rebase origin main || true

          if [ -f latest.json ]; then
            echo "✅ latest.json found ($(wc -c < latest.json) bytes)"
            
            # Archive the fresh version
            mkdir -p archive
            TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
            cp latest.json "archive/${TIMESTAMP}.json"
            echo "✅ Archived to archive/${TIMESTAMP}.json"

            # Stage archive and any other generated files
            git add archive/
            if [ -f ftp_history.json ]; then
              git add ftp_history.json
              echo "✅ Staged ftp_history.json"
            fi
            if [ -f history.json ]; then
              git add history.json
              echo "✅ Staged history.json"
            fi

            if ! git diff --staged --quiet; then
              git commit -m "Archive training data - $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
              git push
              echo "✅ Archive committed and pushed"
            else
              echo "⏭️  No new archive to commit"
            fi
          else
            echo "⚠️ Skipping archive - no latest.json found"
          fi
      
      - name: Update README with last sync time
        if: success()
        run: |
          SYNC_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          if [ -f README.md ] && grep -q "Last successful sync:" README.md; then
            sed -i "s/\*\*Last successful sync:\*\*.*/\*\*Last successful sync:\*\* ${SYNC_TIME}/" README.md
            
            if ! git diff --quiet README.md; then
              git add README.md
              git commit -m "Update last sync timestamp: ${SYNC_TIME}"
              git push
              echo "✅ README updated: ${SYNC_TIME}"
            fi
          fi
      
      - name: Show result
        run: |
          echo "✅ Sync completed successfully!"
          echo "📊 View data: https://raw.githubusercontent.com/${{ github.repository }}/main/latest.json"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::⚠️ Sync failed! Check the logs above for details."
