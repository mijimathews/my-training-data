name: WHOOP → Intervals.icu Sync

on:
  schedule:
    # Run every 6 hours
    - cron: '7 */6 * * *'
  workflow_dispatch:
    inputs:
      sync_days:
        description: 'Number of days to sync'
        required: false
        default: '3'

concurrency:
  group: whoop-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.WHOOP_CLIENT_ID }}" ]; then echo "Missing WHOOP_CLIENT_ID"; exit 1; fi
          if [ -z "${{ secrets.WHOOP_CLIENT_SECRET }}" ]; then echo "Missing WHOOP_CLIENT_SECRET"; exit 1; fi
          echo "All WHOOP secrets configured"

      - name: Sync WHOOP to Intervals.icu
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          SYNC_DAYS: ${{ inputs.sync_days || '3' }}
        run: python whoop_sync.py

      - name: Persist rotated refresh token
        run: |
          if [ ! -f .whoop_refresh_token ]; then
            echo "No token file found"
            exit 0
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .whoop_refresh_token
          if git diff --staged --quiet; then
            echo "Token unchanged, nothing to commit"
            exit 0
          fi
          git commit -m "Rotate WHOOP refresh token"

          # Retry push up to 5 times to handle concurrent auto-sync pushes
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main && git push && echo "Push succeeded on attempt $i" && exit 0
            git rebase --abort 2>/dev/null || true
            echo "Push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          echo "::error::Failed to push rotated token after 5 attempts. Token will be stale on next run."
          exit 1
